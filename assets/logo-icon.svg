  <g>
    <line x1="256" y1="270" x2="256" y2="60" stroke="#7c5cad" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="256" y1="270" x2="396" y2="86" stroke="#9a7032" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
    <line x1="256" y1="270" x2="452" y2="180" stroke="#547c47" stroke-width="3" stroke-linecap="round" opacity="0.42"/>
    <line x1="256" y1="270" x2="468" y2="248" stroke="#3568b2" stroke-width="2.5" stroke-linecap="round" opacity="0.32"/>
    <line x1="256" y1="270" x2="116" y2="86" stroke="#b4637a" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
    <line x1="256" y1="270" x2="60" y2="180" stroke="#2b7d84" stroke-width="3" stroke-linecap="round" opacity="0.42"/>
    <line x1="256" y1="270" x2="44" y2="248" stroke="#9a7032" stroke-width="2.5" stroke-linecap="round" opacity="0.32"/>
    <line x1="256" y1="270" x2="330" y2="68" stroke="#547c47" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="256" y1="270" x2="182" y2="68" stroke="#3568b2" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="256" y1="270" x2="430" y2="140" stroke="#b4637a" stroke-width="2" stroke-linecap="round" opacity="0.28"/>
    <line x1="256" y1="270" x2="82" y2="140" stroke="#7c5cad" stroke-width="2" stroke-linecap="round" opacity="0.28"/>
  </g>

  <!-- Concentric wash circles -->
  <circle cx="256" cy="270" r="140" fill="#f5eddb" opacity="0.5"/>
  <circle cx="256" cy="270" r="112" fill="#ede6f5" opacity="0.45"/>
  <circle cx="256" cy="270" r="86" fill="#e6f0e0" opacity="0.5"/>
  <circle cx="256" cy="270" r="60" fill="#ddf0f0" opacity="0.55"/>
  <circle cx="256" cy="270" r="36" fill="#e2ecf8" opacity="0.5"/>
  <circle cx="256" cy="270" r="16" fill="#f5e4e8" opacity="0.6"/>

