  <rect x="0" y="270" width="512" height="242" fill="#faf6f0"/>
  <line x1="32" y1="270" x2="480" y2="270" stroke="#e8e0d6" stroke-width="2"/>

  <!-- Text below horizon -->
  <text x="256" y="336" text-anchor="middle" font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif" font-size="42" fill="#4c4f69" font-weight="500" letter-spacing="6">PASTEL</text>
  <text x="256" y="386" text-anchor="middle" font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif" font-size="42" fill="#7c5cad" font-weight="500" letter-spacing="6">DAWN</text>
