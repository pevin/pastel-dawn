<svg xmlns="http://www.w3.org/2000/svg" width="560" height="80" viewBox="0 0 560 80">
  <!-- Mark -->
  <g>
    <!-- Rays -->
    <line x1="40" y1="40" x2="40" y2="4" stroke="#7c5cad" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="40" y1="40" x2="66" y2="8" stroke="#9a7032" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
    <line x1="40" y1="40" x2="78" y2="24" stroke="#547c47" stroke-width="1.5" stroke-linecap="round" opacity="0.42"/>
    <line x1="40" y1="40" x2="80" y2="36" stroke="#3568b2" stroke-width="1.2" stroke-linecap="round" opacity="0.32"/>
    <line x1="40" y1="40" x2="14" y2="8" stroke="#b4637a" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
    <line x1="40" y1="40" x2="2" y2="24" stroke="#2b7d84" stroke-width="1.5" stroke-linecap="round" opacity="0.42"/>
    <line x1="40" y1="40" x2="0" y2="36" stroke="#9a7032" stroke-width="1.2" stroke-linecap="round" opacity="0.32"/>
    <line x1="40" y1="40" x2="54" y2="5" stroke="#547c47" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <line x1="40" y1="40" x2="26" y2="5" stroke="#3568b2" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

    <!-- Circles clipped to top half -->
    <clipPath id="halfh">
      <rect x="0" y="0" width="80" height="40"/>
    </clipPath>
    <g clip-path="url(#halfh)">
      <circle cx="40" cy="40" r="28" fill="#f5eddb" opacity="0.5"/>
      <circle cx="40" cy="40" r="22" fill="#ede6f5" opacity="0.45"/>
      <circle cx="40" cy="40" r="16" fill="#e6f0e0" opacity="0.5"/>
      <circle cx="40" cy="40" r="11" fill="#ddf0f0" opacity="0.55"/>
      <circle cx="40" cy="40" r="6" fill="#e2ecf8" opacity="0.5"/>
    </g>
    <!-- Horizon -->
    <line x1="4" y1="40" x2="76" y2="40" stroke="#e8e0d6" stroke-width="1"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="34" font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif" font-size="28" fill="#4c4f69" font-weight="500" letter-spacing="5">pastel</text>
  <text x="242" y="34" font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif" font-size="28" fill="#7c5cad" font-weight="500" letter-spacing="5">dawn</text>

  <!-- Tagline -->
  <text x="100" y="58" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#9893a5" letter-spacing="2">a warm light theme for neovim</text>
</svg>
