# Pastel Dawn — tmux theme
# https://github.com/pevin/pastel-dawn
#
# Install: add the following line to your ~/.tmux.conf
#   source-file /path/to/pastel-dawn/extras/tmux/pastel-dawn.conf

# ── Pane borders ────────────────────────────────────────────────────────────
set -g pane-border-style         "fg=#ddd4c8"
set -g pane-active-border-style  "fg=#7c5cad"

# ── Status bar ──────────────────────────────────────────────────────────────
set -g status                    on
set -g status-position           bottom
set -g status-style              "bg=#f4ede5,fg=#6c6f85"
set -g status-left-length        40
set -g status-right-length       60

set -g status-left  "#[bg=#7c5cad,fg=#faf6f0,bold] #S #[bg=#f4ede5,fg=#7c5cad] "
set -g status-right "#[fg=#9893a5] %H:%M  %d %b "

# ── Window tabs ─────────────────────────────────────────────────────────────
setw -g window-status-style          "fg=#9893a5,bg=#f4ede5"
setw -g window-status-format         " #I #W "
setw -g window-status-current-style  "fg=#4c4f69,bg=#e8ddd1,bold"
setw -g window-status-current-format " #I #W "
setw -g window-status-separator      ""

# ── Messages / command line ─────────────────────────────────────────────────
set -g message-style         "bg=#f5e0b7,fg=#4c4f69"
set -g message-command-style "bg=#f5e0b7,fg=#4c4f69"

# ── Copy mode ───────────────────────────────────────────────────────────────
setw -g mode-style "bg=#e8ddd1,fg=#4c4f69"
